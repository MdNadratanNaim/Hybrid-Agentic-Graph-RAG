name: Trigger Render deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK }}"
